{% extends "layout.html" %}

{% block title %}Pop Growth Helper{% endblock %}

{% block content %}
<div class="container">
    <h1>Pop Growth Helper</h1>
    <p class="text-muted">Foreign pop source is automatically selected from nations within 10 tiles.</p>
    <form method="post" action="/pop_growth_helper/process">
        <table class="info-table">
            <thead>
                <tr>
                    <th>Nation</th>
                    <th>Include in Growth</th>
                </tr>
            </thead>
            <tbody>
                {% for nation in nations %}
                    <tr>
                        <td>
                            <a href="/nations/item/{{ nation.name }}">{{ nation.name }}</a>
                        </td>
                        <td>
                            <input type="checkbox" name="include_{{ nation._id }}">
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="button-container">
            <button type="submit" class="submit-button">Process Pop Growth</button>
        </div>
    </form>
</div>
{% endblock %}
